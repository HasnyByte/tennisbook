{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}{{ title }} | TennisBook Admin{% endblock %}

{% block branding %}
<a href="{% url 'admin:index' %}" id="site-name" style="font-family:'Anton',sans-serif;letter-spacing:-0.02em;color:#DFFF00;font-size:1.6rem;text-decoration:none;display:flex;align-items:center;gap:8px;">
  TennisBook
  <span style="font-family:'Bebas Neue',sans-serif;font-size:0.65rem;background:#DFFF00;color:#0A3D1F;padding:2px 8px;border-radius:999px;letter-spacing:0.1em;">ADMIN</span>
</a>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Anton&family=Bebas Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
  :root {
    --primary: #1DB954;
    --primary-fg: #fff;
    --header-color: #DFFF00;
    --header-bg: #0A3D1F;
    --header-link-color: #DFFF00;
    --breadcrumbs-fg: #ccc;
    --breadcrumbs-bg: #0f5128;
    --breadcrumbs-link-fg: #DFFF00;
    --breadcrumbs-current: #fff;
    --link-fg: #1DB954;
    --link-hover-color: #0e9c42;
    --link-selected-fg: #1DB954;
    --hair-line: #e0f0e9;
    --darkened-bg: #f0faf4;
    --selected-bg: #e8f8f0;
    --selected-row: #f0fff7;
    --button-fg: #fff;
    --button-bg: #1DB954;
    --button-hover-bg: #17a349;
    --default-button-bg: #0A3D1F;
    --default-button-hover-bg: #0d5228;
    --close-button-bg: #888;
    --close-button-hover-bg: #747474;
    --delete-button-bg: #ba2121;
    --delete-button-hover-bg: #a41515;
    --object-tools-fg: #fff;
    --object-tools-bg: #1DB954;
    --object-tools-hover-bg: #17a349;
  }

  * { -webkit-font-smoothing: antialiased; }
  body, td, th, input, select, textarea, .form-row label { font-family: 'Inter', sans-serif !important; }

  /* Header */
  #header { background: #0A3D1F !important; padding: 12px 20px; }
  #header a:link, #header a:visited { color: #DFFF00 !important; }
  #branding h1 { color: #DFFF00 !important; }
  #user-tools { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.08em; color: #fff !important; }
  #user-tools a { color: #DFFF00 !important; text-decoration: none; }
  #user-tools a:hover { color: #fff !important; text-decoration: underline; }

  /* Nav / Breadcrumbs */
  div.breadcrumbs { background: #0f5128 !important; color: #ccc !important; font-family: 'Inter', sans-serif; font-size: 13px; }
  div.breadcrumbs a { color: #DFFF00 !important; }

  /* Sidebar */
  #nav-sidebar { background: #0A3D1F !important; border-right: 1px solid #0f5128; }
  #nav-sidebar .current-app .section:link, #nav-sidebar .current-app .section:visited { color: #DFFF00 !important; background: #0f5128 !important; }
  #nav-sidebar a:link, #nav-sidebar a:visited { color: #b0c8bc !important; }
  #nav-sidebar a:hover { color: #DFFF00 !important; background: rgba(29,185,84,0.12) !important; }
  #nav-sidebar .module caption { background: #0f5128 !important; color: #DFFF00 !important; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.12em; font-size: 0.85rem; }
  #nav-sidebar .module { background: transparent !important; border: none !important; }

  /* Main Content */
  #main { background: #F5F5F0 !important; }
  .module { background: #fff !important; border-radius: 12px !important; border: none !important; box-shadow: 0 2px 12px rgba(0,0,0,0.06) !important; overflow: hidden; margin-bottom: 20px; }
  .module h2, .module caption, .inline-group h2 { background: #0A3D1F !important; color: #DFFF00 !important; font-family: 'Bebas Neue', sans-serif !important; letter-spacing: 0.1em !important; font-size: 1rem !important; border-radius: 0 !important; padding: 12px 16px !important; }

  /* Content area */
  #content { padding: 24px !important; }
  #content h1 { font-family: 'Anton', sans-serif !important; color: #0A3D1F !important; letter-spacing: -0.02em; font-size: 1.8rem; }
  #content-main { background: transparent !important; }

  /* Buttons */
  .button, input[type=submit], input[type=button], .submit-row input, a.button {
    background: #1DB954 !important; color: #fff !important; border: none !important;
    border-radius: 8px !important; font-family: 'Bebas Neue', sans-serif !important;
    letter-spacing: 0.08em !important; padding: 8px 18px !important; cursor: pointer !important;
  }
  .button:hover, input[type=submit]:hover { background: #17a349 !important; }
  .button.default, input[type=submit].default { background: #0A3D1F !important; }
  .button.default:hover { background: #0f5128 !important; }
  .deletelink, a.deletelink { background: #dc2626 !important; border-radius: 8px !important; padding: 8px 18px !important; font-family: 'Bebas Neue', sans-serif !important; letter-spacing: 0.08em !important; }

  /* Table */
  #result_list thead th { background: #0A3D1F !important; color: #DFFF00 !important; font-family: 'Bebas Neue', sans-serif !important; letter-spacing: 0.08em !important; border: none !important; }
  #result_list thead th a:link, #result_list thead th a:visited { color: #DFFF00 !important; }
  #result_list tr.row1 { background: #fff !important; }
  #result_list tr.row2 { background: #f8fdf9 !important; }
  #result_list tr:hover { background: #e8f8f0 !important; }
  .paginator { font-family: 'Inter', sans-serif !important; }

  /* Inputs */
  input[type=text], input[type=password], input[type=email], input[type=url],
  input[type=number], textarea, select {
    border: 1.5px solid #d1d5db !important; border-radius: 8px !important;
    padding: 8px 12px !important; font-family: 'Inter', sans-serif !important;
    transition: border-color 0.2s !important;
  }
  input:focus, textarea:focus, select:focus { border-color: #1DB954 !important; outline: none !important; box-shadow: 0 0 0 3px rgba(29,185,84,0.1) !important; }

  /* Messages */
  .messagelist li { border-radius: 8px !important; font-family: 'Inter', sans-serif !important; }
  .messagelist li.success { background: #e8f8f0 !important; color: #0A3D1F !important; border-left: 4px solid #1DB954 !important; }
  .messagelist li.warning { background: #fefce8 !important; border-left: 4px solid #eab308 !important; }
  .messagelist li.error { background: #fef2f2 !important; border-left: 4px solid #dc2626 !important; }

  /* Object Tools */
  .object-tools a { background: #1DB954 !important; border-radius: 8px !important; font-family: 'Bebas Neue', sans-serif !important; letter-spacing: 0.08em !important; }
  .object-tools a:hover { background: #17a349 !important; }

  /* Filter sidebar */
  #changelist-filter { background: #fff !important; border-radius: 12px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.06) !important; border: none !important; overflow: hidden; }
  #changelist-filter h2 { background: #0A3D1F !important; color: #DFFF00 !important; font-family: 'Bebas Neue', sans-serif !important; letter-spacing: 0.1em !important; }
  #changelist-filter h3 { font-family: 'Inter', sans-serif !important; font-weight: 600 !important; color: #0A3D1F !important; }
  #changelist-filter li.selected a { color: #1DB954 !important; font-weight: 600 !important; }

  /* Submit row */
  .submit-row { background: #fff !important; border-radius: 12px !important; padding: 16px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.06) !important; border: none !important; }

  /* Login page overrides handled by admin/login.html */
</style>
{% endblock %}
